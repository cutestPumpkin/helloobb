<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卢卓宁你的老公来了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .title {
            font-size: 18px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .bio {
            color: #555;
            line-height: 1.6;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 0 auto 28px;
            border-radius: 3px;
        }

        .contact {
            background: #f8f9fc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            color: #333;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s;
        }

        .contact-item:hover {
            color: #667eea;
            transform: translateX(3px);
        }

        .contact-icon {
            font-size: 20px;
            width: 28px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .social-btn {
            background: #f0f2f5;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            ✨
        </div>

        <h1 class="name">你的老公yqt</h1>
        <div class="title">✨ 创造者 / 设计师 ✨</div>
        
        <p class="bio">
            热爱生活，热爱创造。喜欢把美好的想法变成真实的网页和产品。
            相信简单和优雅的设计能让世界更美好。
        </p>
        
        <div class="divider"></div>

        <div class="skills">
            <span class="skill-tag">UI/UX 设计</span>
            <span class="skill-tag">前端开发</span>
            <span class="skill-tag">创意写作</span>
            <span class="skill-tag">摄影</span>
        </div>

        <div class="contact">
            <a href="mailto:hello@example.com" class="contact-item">
                <span class="contact-icon">📧</span>
                <span>hello@yqt</span>
            </a>
            <a href="tel:14777503612" class="contact-item">
                <span class="contact-icon">📞</span>
                <span>14777503612<span>
            </a>
            <div class="contact-item">
                <span class="contact-icon">📍</span>
                <span>中国 · 成都</span>
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.xiaohongshu.com/user/profile/5f657b9800000000010029b6?xsec_token=YBhUIqN89cY5uxyq7BmouNAQX_wdK6YekZLmDm86wvOao=&xsec_source=app_share&xhsshare=SinaWeibo&appuid=619d1caa000000001000f30a&apptime=1781535208&share_id=f11ef5fd6a7749aaafe9ee03a547a33" class="social-btn">📘 小红书</a>
            <a href="#" class="social-btn">📷 Instagram</a>
            <a href="#" class="social-btn">💻 GitHub</a>
            <a href="#" class="social-btn">🎨 设计作品</a>
        </div>

        <a href="https://www.1redbook.com/book/32705863999560/32706186346565.html" class="btn">📄 点击芹饭带土</a>
        
        <div class="footer">
            ✨ 保持好奇，保持热爱 ✨
        </div>
    </div>
</body>
</html>
